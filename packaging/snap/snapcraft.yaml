name: netcheck
version: '2.1.0'
summary: Network diagnostics engine (DNS, ping, HTTP, TCP, SSL, interfaces)
title: NetCheck - Network Connectivity Tester
license: GPL-3.0
website: https://github.com/farman20ali/network_access_check
source-code: https://github.com/farman20ali/network_access_check
issues: https://github.com/farman20ali/network_access_check/issues
contact: https://github.com/farman20ali/network_access_check/issues
description: |
  A powerful cross-platform network diagnostics and connectivity testing engine.
  
  Features:
  - DNS lookup (A/AAAA records, cached, with strict timeouts)
  - TCP connectivity checks (concurrent host/port scanning)
  - HTTP/HTTPS status audits (latency, response size, redirects)
  - SSL/TLS cert validation (subject, issuer, expiry warning)
  - ICMP ping checks (packet loss and RTT stats)
  - Network interface enumeration (wireless/hotspot active detection)
  - Zero-dependency Model Context Protocol (MCP) server
  
  IMPORTANT: For full functionality (ping and interface list), run after installation:
    sudo snap connect netcheck:network-observe

grade: stable
confinement: strict

base: core22

architectures:
  - build-on: amd64

apps:
  netcheck:
    command: bin/netcheck
    plugs:
      - network
      - network-bind
      - network-observe
      - home
    environment:
      LC_ALL: C.UTF-8

parts:
  netcheck:
    plugin: python
    source: .
    source-type: local
    stage-packages:
      - iputils-ping
